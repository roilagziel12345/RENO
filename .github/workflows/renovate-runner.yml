name: Renovate Runner

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "renovate.json"
      - ".github/workflows/renovate-runner.yml"
  schedule:
    - cron: "0 22 * * 0-4"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: renovate-runner
  cancel-in-progress: false

jobs:
  renovate:
    name: Run self-hosted Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: docker://renovate/renovate:latest
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_REQUIRE_CONFIG: required
          LOG_LEVEL: info
