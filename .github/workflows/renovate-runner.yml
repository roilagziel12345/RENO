name: Renovate Runner

on:
  workflow_dispatch:
    inputs:
      repositories:
        description: "Comma-separated owner/repo list. Defaults to the current repository or RENOVATE_REPOSITORIES variable."
        required: false
        type: string
      log_level:
        description: "Renovate log level."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
  push:
    branches:
      - main
    paths:
      - "renovate.json"
      - "config.js"
      - "renovate/platform-config.js"
      - "renovate/repositories.example.json"
      - "renovate/repositories.json"
      - ".github/workflows/renovate-runner.yml"
  schedule:
    - cron: "0 22 * * 0-4"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: renovate-runner
  cancel-in-progress: false

jobs:
  renovate:
    name: Run self-hosted Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: docker://renovate/renovate:latest
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_PLATFORM: ${{ vars.RENOVATE_PLATFORM || 'github' }}
          RENOVATE_ENDPOINT: ${{ vars.RENOVATE_ENDPOINT }}
          RENOVATE_REPOSITORIES: ${{ inputs.repositories || vars.RENOVATE_REPOSITORIES || github.repository }}
          RENOVATE_REQUIRE_CONFIG: optional
          LOG_LEVEL: ${{ inputs.log_level || 'info' }}
