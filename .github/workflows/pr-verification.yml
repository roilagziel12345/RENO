name: PR Verification

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - "apps/**"
      - "renovate.json"
      - ".github/workflows/pr-verification.yml"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-verification-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependency-manifest-tests:
    name: Dynamic dependency manifest tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test changed dependency manifests
        shell: bash
        run: |
          set -euo pipefail

          base_ref="${{ github.event.pull_request.base.sha }}"
          head_ref="${{ github.event.pull_request.head.sha }}"
          mapfile -t changed_files < <(git diff --name-only "$base_ref" "$head_ref")

          declare -A node_dirs=()
          declare -A maven_dirs=()
          declare -A python_dirs=()

          for file in "${changed_files[@]}"; do
            case "$file" in
              */node_modules/*) ;;
              */package.json|package.json) node_dirs["$(dirname "$file")"]=1 ;;
              */package-lock.json|package-lock.json) node_dirs["$(dirname "$file")"]=1 ;;
              */pom.xml|pom.xml) maven_dirs["$(dirname "$file")"]=1 ;;
              */requirements.txt|requirements.txt) python_dirs["$(dirname "$file")"]=1 ;;
            esac
          done

          if (( ${#node_dirs[@]} == 0 && ${#maven_dirs[@]} == 0 && ${#python_dirs[@]} == 0 )); then
            echo "No dependency manifests changed."
            exit 0
          fi

          for dir in "${!node_dirs[@]}"; do
            echo "::group::npm test: $dir"
            npm --prefix "$dir" install
            npm --prefix "$dir" test
            echo "::endgroup::"
          done

          for dir in "${!maven_dirs[@]}"; do
            echo "::group::maven test: $dir"
            mvn -f "$dir/pom.xml" test
            echo "::endgroup::"
          done

          for dir in "${!python_dirs[@]}"; do
            echo "::group::python test: $dir"
            python -m pip install -r "$dir/requirements.txt"
            if find "$dir" -maxdepth 2 \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
              python -m pytest "$dir"
            else
              echo "No pytest tests found under $dir; dependency install is the verification."
            fi
            echo "::endgroup::"
          done
