name: PR Verification

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - "apps/**"
      - "renovate.json"
      - ".github/workflows/pr-verification.yml"

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      frontend-node: ${{ steps.filter.outputs.frontend-node }}
      backend-java: ${{ steps.filter.outputs.backend-java }}
      data-python: ${{ steps.filter.outputs.data-python }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect dependency updates
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend-node:
              - 'apps/frontend-node/package.json'
              - 'apps/frontend-node/package-lock.json'
            backend-java:
              - 'apps/backend-java/pom.xml'
            data-python:
              - 'apps/data-python/requirements.txt'

  frontend-node:
    name: Test frontend-node
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend-node == 'true'
    defaults:
      run:
        working-directory: apps/frontend-node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Test
        run: npm test

  backend-java:
    name: Test backend-java
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend-java == 'true'
    defaults:
      run:
        working-directory: apps/backend-java
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test
        run: mvn test

  data-python:
    name: Test data-python
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.data-python == 'true'
    defaults:
      run:
        working-directory: apps/data-python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/data-python/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test
        run: pytest

  no-app-changes:
    name: No app dependency changes
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.frontend-node != 'true' &&
      needs.changes.outputs.backend-java != 'true' &&
      needs.changes.outputs.data-python != 'true'
    steps:
      - name: Skip app tests
        run: echo "No app dependency manifests changed."
